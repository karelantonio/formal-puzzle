<!DOCTYPE HTML>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App</title>
  <style>body { padding: 0; margin: 0; }</style>
  <link rel="stylesheet" href="app.css"/>
</head>
<body>
<pre id="elm"></pre>
<noscript>Es necesario JavaScript para correr esta app</noscript>
<script src="app.js"></script>
<script>
var app = Elm.Main.init({
  node: document.getElementById('app'),
  flags: Date.now()
});
app.ports.scrollToBottom.subscribe(function(id){
  requestAnimationFrame(function(_){
    var elem = document.getElementById(id);
    if(!elem){
      return;
    }
    elem.scroll(0, elem.scrollHeight);
  });
});
app.ports.insertInInput.subscribe(function(args){
  requestAnimationFrame(function(_){
    var elem = document.getElementById(args[0]);
    if(!elem){
      return;
    }
    var txt = elem.value;
    if(!txt){
      txt="";
    }
    var res = txt.substring(0,elem.selectionStart) + args[1] + txt.substring(elem.selectionEnd,txt.length);
    app.ports.doneInsertInInput.send(res);
  });
});
</script>
</body>
</html>
